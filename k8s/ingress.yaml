apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-reviews-api
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: product-reviews-api
                port:
                  number: 80
